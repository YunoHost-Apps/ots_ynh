#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2
id = "ots"
name = "ots"
description.en = "One time secret sharing platform with symetric encryption in the browser"
description.fr = "Partage de secrets chiffrés à usage unique dans le navigateur"
version = "1.21.8~ynh1"

maintainers = ["otm33GH"]

[upstream]
license = "Apache-2.0"
website = "https://ots.fyi/"
demo = "https://ots.fyi/"
admindoc = "https://github.com/Luzifer/ots/wiki"
code = "https://github.com/Luzifer/ots"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = ["amd64", "arm64"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "500M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources]

    [resources.sources.main]
    amd64.url = "https://github.com/Luzifer/ots/releases/download/v1.21.8/ots_linux_amd64.tgz"
    amd64.sha256 = "458785548ead21786ab6e1c0564c6764c9ba3ae250d5e47a6ab5a5a1236bccd0"
    arm64.url = "https://github.com/Luzifer/ots/releases/download/v1.21.8/ots_linux_arm64.tgz"
    arm64.sha256 = "bdcf701abfe8795ddcd3644935b9ea00f0e50b4cbbdfc066792b368b1fb76187"
    in_subdir = false

    autoupdate.asset.amd64 = "ots_linux_amd64.tgz"
    autoupdate.asset.arm64 = "ots_linux_arm64.tgz"
    autoupdate.strategy = "latest_github_release"
    
    [resources.system_user]
    
    [resources.install_dir]

    [resources.permissions]
    main.url = "/"
    main.auth_header = false

    [resources.ports]
