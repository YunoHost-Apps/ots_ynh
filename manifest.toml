#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2
id = "ots"
name = "ots"
description.en = "One time secret sharing platform with symetric encryption in the browser"
description.fr = "Partage de secrets chiffrés à usage unique dans le navigateur"
version = "1.21.7~ynh1"

maintainers = ["otm33GH"]

[upstream]
license = "Apache-2.0"
website = "https://ots.fyi/"
demo = "https://ots.fyi/"
admindoc = "https://github.com/Luzifer/ots/wiki"
code = "https://github.com/Luzifer/ots"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = ["amd64", "arm64"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "500M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources]

    [resources.sources.main]
    amd64.url = "https://github.com/Luzifer/ots/releases/download/v1.21.7/ots_linux_amd64.tgz"
    amd64.sha256 = "6355b5c6c9a537de736bbdae5ef85b72c1245f335578f9017f543abd4767ab7e"
    arm64.url = "https://github.com/Luzifer/ots/releases/download/v1.21.7/ots_linux_arm64.tgz"
    arm64.sha256 = "2ae468b45fe270cd1f037f8db6527bb379397b1ad9856ea55f5979fe877cc364"
    in_subdir = false

    autoupdate.asset.amd64 = "ots_linux_amd64.tgz"
    autoupdate.asset.arm64 = "ots_linux_arm64.tgz"
    autoupdate.strategy = "latest_github_release"
    
    [resources.system_user]
    
    [resources.install_dir]

    [resources.permissions]
    main.url = "/"
    main.auth_header = false

    [resources.ports]
